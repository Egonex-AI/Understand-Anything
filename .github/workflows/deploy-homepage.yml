name: Deploy Homepage

on:
  push:
    branches: [main]
    paths:
      - 'homepage/**'
      - 'understand-anything-plugin/packages/dashboard/**'
      - 'understand-anything-plugin/packages/core/**'
      - '.github/workflows/deploy-homepage.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to commit SHAs (not floating tags) so a
      # compromised tag can't run arbitrary code in the deploy pipeline.
      # Dependabot's github-actions ecosystem keeps these fresh.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build homepage
        working-directory: homepage
        run: pnpm build

      - name: Build core
        run: pnpm --filter @understand-anything/core build

      - name: Build demo dashboard
        run: pnpm --filter @understand-anything/dashboard build:demo
        env:
          VITE_GRAPH_URL: ${{ vars.DEMO_GRAPH_URL }}
          VITE_DOMAIN_GRAPH_URL: ${{ vars.DEMO_DOMAIN_GRAPH_URL }}
          VITE_META_URL: ${{ vars.DEMO_META_URL }}

      - name: Merge demo into homepage output
        run: cp -r understand-anything-plugin/packages/dashboard/dist homepage/dist/demo

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: homepage/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
