name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to commit SHAs (not floating tags) so a
      # compromised tag can't run arbitrary code in CI. Dependabot's
      # github-actions ecosystem keeps these fresh.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build core
        run: pnpm --filter @understand-anything/core build

      - name: Build skill
        run: pnpm --filter @understand-anything/skill build

      - name: Test core
        run: pnpm --filter @understand-anything/core test

      - name: Test skill
        run: pnpm --filter @understand-anything/skill test
