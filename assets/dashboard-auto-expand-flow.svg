<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="680" height="520">
  <defs>
    <style>
      .box { fill: #1a1a1a; stroke: rgba(212,165,116,0.5); stroke-width: 1.5; rx: 6; }
      .box-green { fill: #0f1a10; stroke: #4caf50; stroke-width: 1.5; }
      .box-blue { fill: #141420; stroke: #5c6bc0; stroke-width: 1.5; }
      .box-red { fill: #1a1010; stroke: #c97070; stroke-width: 1.5; }
      .box-gold { fill: #1a1505; stroke: rgba(212,165,116,0.7); stroke-width: 1.5; }
      .title { font: bold 14px sans-serif; fill: #ccc; }
      .label { font: 11px sans-serif; fill: #bbb; }
      .small { font: 10px monospace; fill: #888; }
      .green { fill: #4caf50; }
      .blue { fill: #9fa8da; }
      .red { fill: #ef9a9a; }
      .gold { fill: rgba(212,165,116,0.9); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#666"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#4caf50"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#c97070"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" class="title">Auto-Expand Flow — GraphViewInner</text>

  <!-- Step 1: User navigates to layer -->
  <rect x="220" y="50" width="240" height="44" rx="6" class="box"/>
  <text x="340" y="70" text-anchor="middle" class="label">User navigates to layer</text>
  <text x="340" y="86" text-anchor="middle" class="small">drillIntoLayer(layerId) → pendingFitRef=true</text>

  <!-- Arrow down -->
  <line x1="340" y1="94" x2="340" y2="118" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: ELK Stage 1 layout -->
  <rect x="190" y="118" width="300" height="44" rx="6" class="box-blue"/>
  <text x="340" y="138" text-anchor="middle" class="label" style="fill:#9fa8da">ELK Stage 1 layout runs</text>
  <text x="340" y="154" text-anchor="middle" class="small">newLayoutRef.current = true → false when done</text>

  <!-- Arrow down -->
  <line x1="340" y1="162" x2="340" y2="186" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: nodes-watch fitView effect -->
  <rect x="185" y="186" width="310" height="52" rx="6" class="box-blue"/>
  <text x="340" y="206" text-anchor="middle" class="label" style="fill:#9fa8da">nodes-watch effect fires</text>
  <text x="340" y="222" text-anchor="middle" class="small">if (newLayoutRef.current) return  ← guards premature fit</text>
  <text x="340" y="236" text-anchor="middle" class="small">else: pendingFitRef=false, fitView(400ms)</text>

  <!-- Arrow down -->
  <line x1="340" y1="238" x2="340" y2="262" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: auto-expand effect (THE NEW LOGIC) -->
  <rect x="160" y="262" width="360" height="70" rx="6" class="box-gold"/>
  <text x="340" y="282" text-anchor="middle" class="label" style="fill:rgba(212,165,116,1)">auto-expand effect fires</text>
  <text x="340" y="298" text-anchor="middle" class="small">if (seen this layer) skip</text>
  <text x="340" y="312" text-anchor="middle" class="small">filter: containers where nodeIds.length ≤ 10</text>
  <text x="340" y="326" text-anchor="middle" class="small">expandContainer(cid) for each small container</text>

  <!-- Branch: large containers -->
  <line x1="160" y1="297" x2="80" y2="297" stroke="#c97070" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="14" y="270" width="66" height="54" rx="6" class="box-red"/>
  <text x="47" y="292" text-anchor="middle" class="small" style="fill:#ef9a9a">large</text>
  <text x="47" y="308" text-anchor="middle" class="small" style="fill:#ef9a9a">containers</text>
  <text x="47" y="322" text-anchor="middle" class="small" style="fill:#ef9a9a">skipped</text>

  <!-- Branch: small containers -->
  <line x1="520" y1="297" x2="598" y2="297" stroke="#4caf50" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="598" y="270" width="68" height="54" rx="6" class="box-green"/>
  <text x="632" y="292" text-anchor="middle" class="small" style="fill:#4caf50">small</text>
  <text x="632" y="308" text-anchor="middle" class="small" style="fill:#4caf50">containers</text>
  <text x="632" y="322" text-anchor="middle" class="small" style="fill:#4caf50">expanded</text>

  <!-- Arrow down -->
  <line x1="340" y1="332" x2="340" y2="356" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: ELK Stage 1 re-layout (bumpStage1Tick) -->
  <rect x="175" y="356" width="330" height="44" rx="6" class="box-blue"/>
  <text x="340" y="376" text-anchor="middle" class="label" style="fill:#9fa8da">ELK Stage 1 re-layout (bumpStage1Tick)</text>
  <text x="340" y="392" text-anchor="middle" class="small">stage1Tick increments → container sizes recalculated</text>

  <!-- Arrow down -->
  <line x1="340" y1="400" x2="340" y2="424" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: pendingExpandFit re-fit -->
  <rect x="185" y="424" width="310" height="52" rx="6" class="box-green"/>
  <text x="340" y="444" text-anchor="middle" class="label" style="fill:#4caf50">pendingExpandFit effect fires</text>
  <text x="340" y="460" text-anchor="middle" class="small">stage1Tick changed → layout settled</text>
  <text x="340" y="476" text-anchor="middle" class="small">fitView(300ms) — all expanded nodes in viewport</text>

  <!-- Legend -->
  <rect x="16" y="430" width="120" height="74" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="24" y="448" font="10px sans-serif" fill="#666">Legend</text>
  <rect x="24" y="456" width="10" height="10" rx="2" fill="#1a1505" stroke="rgba(212,165,116,0.7)" stroke-width="1"/>
  <text x="40" y="466" font="9px sans-serif" fill="#888">new logic (this PR)</text>
  <rect x="24" y="472" width="10" height="10" rx="2" fill="#141420" stroke="#5c6bc0" stroke-width="1"/>
  <text x="40" y="482" font="9px sans-serif" fill="#888">pre-existing / modified</text>
  <rect x="24" y="488" width="10" height="10" rx="2" fill="#0f1a10" stroke="#4caf50" stroke-width="1"/>
  <text x="40" y="498" font="9px sans-serif" fill="#888">visible result</text>
</svg>
