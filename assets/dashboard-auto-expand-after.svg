<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" width="700" height="480">
  <defs>
    <style>
      .title { font: bold 13px sans-serif; fill: #888; }
      .label { font: 11px monospace; fill: #666; }
      .node-label { font: 9px sans-serif; fill: #ccc; }
      .container-label { font: bold 11px sans-serif; fill: rgba(212,165,116,0.9); }
      .badge { font: 9px monospace; fill: #a39787; }
      .file-node { font: 9px monospace; fill: #b0c4de; }
      .arrow { stroke: rgba(212,165,116,0.4); stroke-width: 1; fill: none; marker-end: url(#arr); }
    </style>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(212,165,116,0.4)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="16" y="28" class="title">AFTER — Small containers (≤10 files) auto-expanded on first visit</text>

  <!-- Zoom indicator -->
  <rect x="574" y="12" width="110" height="22" fill="#1a1a1a" rx="4"/>
  <text x="629" y="27" text-anchor="middle" font="10px monospace" fill="#4caf50">zoom: 0.15× ✓</text>

  <!-- Graph canvas area -->
  <rect x="12" y="42" width="676" height="420" fill="#111" rx="8"/>

  <!-- ─── EXPANDED container 1: components/ (7 files ≤ 10) ─── -->
  <rect x="30" y="58" width="190" height="175" fill="rgba(255,255,255,0.04)" rx="8"
        stroke="rgba(212,165,116,0.85)" stroke-width="1.5"/>
  <text x="44" y="78" class="container-label">▾ hooks/</text>
  <text x="208" y="78" text-anchor="end" class="badge">7</text>
  <!-- child nodes -->
  <rect x="42" y="88" width="165" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="101" class="file-node">useLayerDetailGraph.ts</text>

  <rect x="42" y="112" width="165" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="125" class="file-node">useOverviewGraph.ts</text>

  <rect x="42" y="136" width="165" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="149" class="file-node">useTheme.ts</text>

  <rect x="42" y="160" width="165" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="173" class="file-node">useDashboard.ts</text>

  <rect x="42" y="184" width="165" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="197" class="file-node">useSearch.ts</text>

  <rect x="42" y="208" width="165" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="221" class="file-node">useKeyboard.ts</text>

  <!-- ─── EXPANDED container 2: utils/ (5 files ≤ 10) ─── -->
  <rect x="245" y="58" width="185" height="155" fill="rgba(255,255,255,0.04)" rx="8"
        stroke="rgba(212,165,116,0.85)" stroke-width="1.5"/>
  <text x="259" y="78" class="container-label">▾ utils/</text>
  <text x="418" y="78" text-anchor="end" class="badge">5</text>

  <rect x="257" y="88" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="265" y="101" class="file-node">layout.ts</text>

  <rect x="257" y="112" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="265" y="125" class="file-node">elk-layout.ts</text>

  <rect x="257" y="136" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="265" y="149" class="file-node">graph-helpers.ts</text>

  <rect x="257" y="160" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="265" y="173" class="file-node">topology.ts</text>

  <rect x="257" y="184" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="265" y="197" class="file-node">colors.ts</text>

  <!-- ─── COLLAPSED container: services/ (24 files > 10) ─── -->
  <rect x="460" y="58" width="200" height="95" fill="rgba(212,165,116,0.06)" rx="8"
        stroke="rgba(212,165,116,0.55)" stroke-width="1.5"/>
  <text x="476" y="80" class="container-label" style="fill:rgba(212,165,116,0.9)">services/</text>
  <text x="648" y="80" text-anchor="end" class="badge">24</text>
  <text x="476" y="100" font="10px sans-serif" fill="#666">Too large to auto-expand.</text>
  <text x="476" y="115" font="10px sans-serif" fill="#666">Click to explore →</text>
  <!-- Lock icon -->
  <text x="548" y="140" text-anchor="middle" font="22px sans-serif" fill="rgba(212,165,116,0.35)">⊟</text>

  <!-- ─── EXPANDED container 3: store/ (8 files ≤ 10) ─── -->
  <rect x="30" y="258" width="185" height="185" fill="rgba(255,255,255,0.04)" rx="8"
        stroke="rgba(212,165,116,0.85)" stroke-width="1.5"/>
  <text x="44" y="278" class="container-label">▾ store/</text>
  <text x="203" y="278" text-anchor="end" class="badge">8</text>

  <rect x="42" y="288" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="301" class="file-node">dashboardStore.ts</text>
  <rect x="42" y="310" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="323" class="file-node">navigationStore.ts</text>
  <rect x="42" y="332" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="345" class="file-node">searchStore.ts</text>
  <rect x="42" y="354" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="367" class="file-node">themeStore.ts</text>
  <rect x="42" y="378" width="160" height="18" fill="#1e2a3a" rx="3" stroke="#2a4060" stroke-width="1"/>
  <text x="50" y="391" class="file-node">tourStore.ts</text>

  <!-- annotation -->
  <rect x="245" y="258" width="420" height="55" fill="#0f1a10" rx="6" stroke="#4caf50" stroke-width="1"/>
  <text x="265" y="279" font="11px sans-serif" fill="#4caf50">✓  File nodes immediately visible on layer open.</text>
  <text x="265" y="297" font="10px sans-serif" fill="#888">Small containers (≤ 10 files) expanded automatically.</text>
  <text x="265" y="313" font="10px sans-serif" fill="#888">Large containers stay collapsed — no ELK cascade.</text>

  <!-- annotation 2 -->
  <rect x="245" y="332" width="420" height="40" fill="#1a1510" rx="6" stroke="rgba(212,165,116,0.4)" stroke-width="1"/>
  <text x="265" y="352" font="10px sans-serif" fill="rgba(212,165,116,0.8)">Per-layer memory: re-visiting a layer respects manual</text>
  <text x="265" y="368" font="10px sans-serif" fill="rgba(212,165,116,0.8)">collapse/expand decisions the user made.</text>

  <!-- annotation 3 re-fit -->
  <rect x="245" y="392" width="420" height="38" fill="#141420" rx="6" stroke="#5c6bc0" stroke-width="1"/>
  <text x="265" y="411" font="10px sans-serif" fill="#9fa8da">fitView() re-runs after expansion-triggered ELK re-layout</text>
  <text x="265" y="427" font="10px sans-serif" fill="#9fa8da">settles — all expanded content stays in viewport.</text>
</svg>
